<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <title>NEONWAVE — Music Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="rig" id="rig">

        <!-- MAIN PLAYER -->
        <div class="player">
            <div class="brand">
                <div class="dot"></div>
                <span>Neonwave Player</span>
            </div>

            <div class="art-wrap">
                <div class="art-ring"></div>
                <div class="art" id="artEmoji">🎧</div>
            </div>

            <div class="meta">
                <h1 id="songTitle">—</h1>
                <p id="songArtist">—</p>
            </div>

            <div class="progress-row">
                <span id="curTime">0:00</span>
                <div class="bar" id="bar">
                    <div class="bar-fill" id="barFill"></div>
                </div>
                <span id="durTime">0:00</span>
            </div>

            <div class="controls">
                <button class="ctl-btn ctl-small ctl-toggle" id="shuffleBtn" title="Shuffle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                        <line x1="4" y1="4" x2="9" y2="9"></line>
                    </svg>
                </button>

                <button class="ctl-btn" id="prevBtn" title="Previous">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                    </svg>
                </button>

                <button class="play-btn" id="playBtn" title="Play/Pause">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                </button>

                <button class="ctl-btn" id="nextBtn" title="Next">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 18h2V6h-2zM6 18l8.5-6L6 6z" />
                    </svg>
                </button>

                <button class="ctl-btn ctl-small ctl-toggle" id="repeatBtn" title="Repeat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
            </div>

            <div class="bottom-row">
                <div class="vol">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3z" />
                    </svg>
                    <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.7">
                </div>
                <button class="list-toggle-btn" id="listToggleBtn">
                    ☰ Playlist
                </button>
            </div>
        </div>

        <!-- PLAYLIST SIDEBAR -->
        <div class="playlist" id="playlistPanel">
            <h2>Up Next</h2>
            <ul class="track-list" id="trackList"></ul>
        </div>

    </div>

    <audio id="audio" preload="metadata"></audio>

    <script src="script.js"></script>

</body>

</html>
